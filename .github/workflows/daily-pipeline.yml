name: Daily SPO Snapshot

on:
  schedule:
    - cron: '0 3 * * *'  # Once a day at 03:00 UTC
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v3

      - name: 🔧 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔐 Write Firebase service account JSON safely
        run: |
          cat > service-account.json <<EOF
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF

      - name: ▶️ Run ingestSPOs.js
        run: node ingestSPOs.js

      - name: ▶️ Run ingestEpochSPOStats.js
        run: node ingestEpochSPOStats.js
